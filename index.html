<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>쿨라(Kula) 링 멀티 프로젝트 시뮬레이터</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            margin: 0; padding: 0;
            overflow: hidden; 
            width: 100vw; height: 100vh;
            color: white;
            background-image: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
        }

        /* --- 전체 화면 귀여운 물결 효과 --- */
        .wave-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            overflow: hidden; z-index: 1; pointer-events: none; 
        }
        .wave {
            position: absolute; top: -50vh; left: -50vw; width: 200vw; height: 200vh;
            background-repeat: repeat; 
        }
        .wave1 {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100"><path fill="none" stroke="%23ffffff" stroke-width="2.5" stroke-opacity="0.3" d="M0,50 C100,80 100,20 200,50 C300,80 300,20 400,50"></path></svg>');
            background-size: 400px 100px;
            animation: wave1-move 12s linear infinite; z-index: 10;
        }
        .wave2 {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80"><path fill="none" stroke="%23ffffff" stroke-width="2" stroke-opacity="0.2" d="M0,40 C75,10 75,70 150,40 C225,10 225,70 300,40"></path></svg>');
            background-size: 300px 80px;
            animation: wave2-move 8s linear infinite; z-index: 5;
        }
        @keyframes wave1-move { 0% { transform: translate(0, 0); } 100% { transform: translate(-400px, 100px); } }
        @keyframes wave2-move { 0% { transform: translate(0, 0); } 100% { transform: translate(300px, -80px); } }

        #paths-svg { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; }
        .route-line { fill: none; stroke: rgba(255, 255, 255, 0.6); stroke-width: 2; stroke-dasharray: 8 6; }

        /* --- 📂 프로젝트 매니저 패널 (좌측 하단) --- */
        #project-manager {
            position: absolute; bottom: 20px; left: 20px;
            padding: 15px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px); border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 200; color: #333; display: flex; flex-direction: column; gap: 10px;
            width: 220px;
        }
        #project-manager h3 { margin: 0; font-size: 14px; color: #2e7d32; border-bottom: 1px solid #ddd; padding-bottom: 5px; }

        /* --- 상단 중앙 컨트롤 패널 --- */
        #control-panel { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 15px; background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(5px); border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; gap: 8px; z-index: 100; color: #333; min-width: 360px;
        }
        
        /* --- 양쪽 항해 일지 패널 --- */
        .log-panel {
            position: absolute; top: 20px; width: 150px; 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px); border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); padding: 12px;
            display: flex; flex-direction: column; gap: 8px; z-index: 100; color: #333;
        }
        #log-panel-cw { left: 15px; border-top: 4px solid #ff0844; }
        #log-panel-ccw { right: 15px; border-top: 4px solid #999; }
        .log-panel h3 { margin: 0; font-size: 14px; text-align: center; border-bottom: 2px solid #ddd; padding-bottom: 6px; }
        .log-content { font-size: 11px; line-height: 1.5; background: rgba(255, 255, 255, 0.6); padding: 8px; border-radius: 6px; height: 120px; overflow-y: auto; border: 1px inset #ddd; word-break: keep-all; }
        .log-content::-webkit-scrollbar { width: 5px; }
        .log-content::-webkit-scrollbar-thumb { background: #bbb; border-radius: 3px; }

        .control-group { display: flex; gap: 6px; align-items: center; justify-content: center; }
        .divider { border-top: 1px solid #ccc; width: 100%; margin: 3px 0; }

        input, select { padding: 6px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-weight: bold; font-family: inherit; }
        
        button { padding: 6px 10px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; transition: transform 0.1s, opacity 0.2s; font-size: 12px; }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        
        .btn-add { background-color: #2e7d32; }
        .btn-del { background-color: #c62828; }
        .btn-view { background-color: #455a64; }
        .btn-undo { background-color: #78909c; }
        .btn-cw { background-image: linear-gradient(to right, #ff0844 0%, #ffb199 100%); }
        .btn-ccw { background-image: linear-gradient(to right, #d5d4d0 0%, #eeeeec 100%); color: #333; }

        /* --- 침몰 기록 모달 --- */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); z-index: 999; }
        #sink-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 15px; z-index: 1000; color: #333; min-width: 250px; text-align: center; }

        #ocean-map { position: relative; width: 100vw; height: 100vh; z-index: 10; overflow: hidden; }

        .island {
            position: absolute; width: 85px; height: 85px;
            background-image: linear-gradient(to top, #0ba360 0%, #3cba92 100%); 
            border: 3px solid #1a661a; border-radius: 50% 60% 50% 70% / 60% 50% 70% 50%;
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 14px; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            box-shadow: 3px 5px 15px rgba(0,0,0,0.3); transition: all 0.8s ease; z-index: 10;
        }

        .item { position: absolute; width: 56px; height: 40px; cursor: default; z-index: 50; display: flex; align-items: center; justify-content: center; transition: left 1s ease-in-out, top 1s ease-in-out; }
        .boat-body { position: absolute; width: 100%; height: 100%; z-index: -1; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .boat-name { font-size: 11px; font-weight: bold; z-index: 1; pointer-events: none; }

        .item-cw .boat-body { background-image: linear-gradient(to top, #ff0844 0%, #ffb199 100%); border: 2px solid #d32f2f; border-radius: 50% 50% 50% 10%; } 
        .item-cw .boat-name { color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .item-ccw .boat-body { background-image: linear-gradient(to top, #d5d4d0 0%, #eeeeec 100%); border: 2px solid #aaa; border-radius: 4px; } 
        .item-ccw .boat-name { color: #333; }

    </style>
</head>
<body>

<div class="wave-container">
    <div class="wave wave1"></div>
    <div class="wave wave2"></div>
</div>

<svg id="paths-svg"></svg>

<div id="project-manager">
    <h3>📂 내 쿨라 프로젝트</h3>
    <select id="project-selector" onchange="switchProject(this.value)"></select>
    <div class="control-group">
        <input type="text" id="new-project-name" placeholder="새 프로젝트명" style="width: 100px; font-size: 11px;">
        <button class="btn-add" onclick="createNewProject()" style="padding: 5px;">+</button>
        <button class="btn-del" onclick="deleteCurrentProject()" style="padding: 5px;">🗑️</button>
    </div>
</div>

<div id="log-panel-cw" class="log-panel">
    <h3>📜 <span id="log-cw-title">술라바</span> 일지</h3>
    <div id="log-cw-content" class="log-content"></div>
</div>

<div id="control-panel">
    <div class="control-group">
        <input type="text" id="island-name" placeholder="새로운 섬 이름" style="width: 100px;">
        <button class="btn-add" onclick="addIsland()">섬 발견!</button>
    </div>
    <div class="control-group">
        <select id="island-to-sink" style="width: 110px;"></select>
        <button class="btn-del" onclick="sinkSelectedIsland()">섬 침몰</button>
        <button class="btn-view" onclick="toggleSinkRecord()">침몰 기록</button>
    </div>
    <div class="divider"></div>
    <div class="control-group">
        <input type="text" id="input-cw" oninput="updateName('cw', this.value)" style="width: 70px;">
        <button class="btn-cw" onclick="startVoyage('cw')" id="btn-cw-text">🐚 출발</button>
        <button class="btn-undo" onclick="undoVoyage('cw')">↩️</button>
    </div>
    <div class="control-group">
        <input type="text" id="input-ccw" oninput="updateName('ccw', this.value)" style="width: 70px;">
        <button class="btn-ccw" onclick="startVoyage('ccw')" id="btn-ccw-text">🔲 출발</button>
        <button class="btn-undo" onclick="undoVoyage('ccw')">↩️</button>
    </div>
</div>

<div id="log-panel-ccw" class="log-panel">
    <h3>📜 <span id="log-ccw-title">음왈리</span> 일지</h3>
    <div id="log-ccw-content" class="log-content"></div>
</div>

<div id="modal-overlay" onclick="toggleSinkRecord()"></div>
<div id="sink-modal">
    <h2>침몰 기록</h2>
    <ul id="sink-list" style="list-style:none; padding:0; text-align:left; max-height:200px; overflow-y:auto;"></ul>
    <button onclick="toggleSinkRecord()" style="background:#333; width:100%; margin-top:10px;">닫기</button>
</div>

<div id="ocean-map"></div>

<script>
    const getIrregular = () => (Math.random() - 0.5) * 80;
    
    // --- 📂 멀티 프로젝트 관리 로직 ---
    let currentProject = "기본 바다";
    let projectList = ["기본 바다"];
    
    let islands = [];
    let sunkenIslands = [];
    let state = {};
    let centerX, centerY, baseRadius;

    function initProjectManager() {
        const savedList = localStorage.getItem('kula_project_list');
        if (savedList) projectList = JSON.parse(savedList);
        
        currentProject = localStorage.getItem('kula_current_project') || projectList[0];
        updateProjectSelector();
        loadProjectData(currentProject);
    }

    function updateProjectSelector() {
        const sel = document.getElementById('project-selector');
        sel.innerHTML = '';
        projectList.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p; opt.text = p;
            if(p === currentProject) opt.selected = true;
            sel.add(opt);
        });
    }

    function createNewProject() {
        const name = document.getElementById('new-project-name').value.trim();
        if (!name || projectList.includes(name)) return alert("중복되거나 유효하지 않은 이름입니다.");
        
        projectList.push(name);
        localStorage.setItem('kula_project_list', JSON.stringify(projectList));
        document.getElementById('new-project-name').value = '';
        switchProject(name);
    }

    function switchProject(name) {
        currentProject = name;
        localStorage.setItem('kula_current_project', name);
        loadProjectData(name);
        render();
    }

    function deleteCurrentProject() {
        if (projectList.length <= 1) return alert("최소 한 개의 프로젝트는 남겨두어야 합니다.");
        if (!confirm(`'${currentProject}' 프로젝트를 영구 삭제하시겠습니까?`)) return;

        localStorage.removeItem(`kula_data_${currentProject}`);
        projectList = projectList.filter(p => p !== currentProject);
        localStorage.setItem('kula_project_list', JSON.stringify(projectList));
        switchProject(projectList[0]);
    }

    function saveProjectData() {
        const data = { islands, sunkenIslands, state };
        localStorage.setItem(`kula_data_${currentProject}`, JSON.stringify(data));
    }

    function loadProjectData(name) {
        const saved = localStorage.getItem(`kula_data_${name}`);
        if (saved) {
            const parsed = JSON.parse(saved);
            islands = parsed.islands;
            sunkenIslands = parsed.sunkenIslands;
            state = parsed.state;
        } else {
            // 새 프로젝트 기본값
            islands = [
                { name: '키리위나', offsetX: getIrregular(), offsetY: getIrregular() },
                { name: '도부', offsetX: getIrregular(), offsetY: getIrregular() },
                { name: '투비투비', offsetX: getIrregular(), offsetY: getIrregular() }
            ];
            sunkenIslands = [];
            state = {
                cw: { pos: 0, log: [], name: '술라바' },
                ccw: { pos: 1, log: [], name: '음왈리' }
            };
        }
        // UI 반영
        document.getElementById('input-cw').value = state.cw.name;
        document.getElementById('input-ccw').value = state.ccw.name;
    }

    // --- 기존 시뮬레이션 로직 (좌표 계산 및 렌더링) ---
    function updateDimensions() {
        const pTop = 180, pBottom = 120, pSide = 200;
        const sW = window.innerWidth - (pSide * 2), sH = window.innerHeight - pTop - pBottom;
        centerX = pSide + (sW / 2); centerY = pTop + (sH / 2);
        baseRadius = Math.min(sW, sH) * 0.35;
    }

    function getIslandCenter(index) {
        const island = islands[index];
        const angle = (index / islands.length) * (2 * Math.PI) - (Math.PI / 2);
        return {
            x: centerX + (baseRadius + island.offsetX) * Math.cos(angle),
            y: centerY + (baseRadius + island.offsetY) * Math.sin(angle)
        };
    }

    function getItemPoint(key, index) {
        const c = getIslandCenter(index);
        return key === 'cw' ? { x: c.x, y: c.y - 45 } : { x: c.x, y: c.y + 45 };
    }

    function render(movingKey = null) {
        updateDimensions();
        updateDropdown();
        const map = document.getElementById('ocean-map');
        
        // 섬 그리기
        islands.forEach((is, i) => {
            let div = document.getElementById(`island-${i}`);
            if(!div) { div = document.createElement('div'); div.id = `island-${i}`; div.className = 'island'; map.appendChild(div); }
            div.innerText = is.name;
            const c = getIslandCenter(i);
            div.style.left = `${c.x - 42.5}px`; div.style.top = `${c.y - 42.5}px`;
        });
        document.querySelectorAll('.island').forEach(el => { if(parseInt(el.id.split('-')[1]) >= islands.length) el.remove(); });

        // 점선 경로
        const svg = document.getElementById('paths-svg');
        svg.innerHTML = '';
        if(islands.length > 1) {
            let pts = islands.map((_, i) => { const c = getIslandCenter(i); return `${c.x},${c.y}`; }).join(' ');
            const c0 = getIslandCenter(0); pts += ` ${c0.x},${c0.y}`;
            const line = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
            line.setAttribute("points", pts); line.setAttribute("class", "route-line"); svg.appendChild(line);
        }

        // 물건 그리기
        ['cw', 'ccw'].forEach(key => {
            let div = document.getElementById(`item-${key}`);
            if(!div) { div = document.createElement('div'); div.id = `item-${key}`; div.className = `item item-${key}`; div.innerHTML = `<div class="boat-body"></div><span class="boat-name"></span>`; map.appendChild(div); }
            div.querySelector('.boat-name').innerText = state[key].name;
            if(movingKey !== key) {
                const p = getItemPoint(key, state[key].pos);
                div.style.left = `${p.x - 28}px`; div.style.top = `${p.y - 20}px`; div.style.transition = 'all 1s';
            }
        });

        updateLogPanel();
        updateName('cw', state.cw.name);
        updateName('ccw', state.ccw.name);
    }

    // --- 항해 및 부가 기능 ---
    function startVoyage(key) {
        const prev = state[key].pos;
        state[key].log.push(islands[prev].name);
        state[key].pos = key === 'cw' ? (prev + 1) % islands.length : (prev - 1 + islands.length) % islands.length;
        saveProjectData();
        animate(key, prev, state[key].pos);
    }

    function undoVoyage(key) {
        if(state[key].log.length === 0) return;
        const last = state[key].log.pop();
        const target = islands.findIndex(is => is.name === last);
        if(target === -1) return alert("섬이 침몰하여 돌아갈 수 없습니다.");
        const current = state[key].pos;
        state[key].pos = target;
        saveProjectData();
        animate(key, current, target);
    }

    function animate(key, startIdx, endIdx) {
        const el = document.getElementById(`item-${key}`);
        const start = getItemPoint(key, startIdx);
        const end = getItemPoint(key, endIdx);
        const startTime = performance.now();
        el.style.transition = 'none';

        function step(now) {
            const progress = Math.min((now - startTime) / 1200, 1);
            const p = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
            const curX = (1-p)*start.x + p*end.x;
            const curY = (1-p)*start.y + p*end.y;
            el.style.left = `${curX - 28}px`; el.style.top = `${curY - 20}px`;
            if(progress < 1) requestAnimationFrame(step); else render();
        }
        requestAnimationFrame(step);
    }

    function updateName(key, val) {
        state[key].name = val || (key === 'cw' ? '술라바' : '음왈리');
        document.getElementById(`log-${key}-title`).innerText = state[key].name;
        document.getElementById(`btn-${key}-text`).innerText = (key === 'cw' ? '🐚 ' : '🔲 ') + "출발";
        saveProjectData();
    }

    function updateLogPanel() {
        ['cw', 'ccw'].forEach(k => {
            const div = document.getElementById(`log-${k}-content`);
            div.innerHTML = state[k].log.length ? state[k].log.join('<br>➔ ') : '정박 중...';
            div.scrollTop = div.scrollHeight;
        });
    }

    function addIsland() {
        const input = document.getElementById('island-name');
        islands.push({ name: input.value || `섬 ${islands.length+1}`, offsetX: getIrregular(), offsetY: getIrregular() });
        input.value = ''; saveProjectData(); render();
    }

    function updateDropdown() {
        const sel = document.getElementById('island-to-sink');
        sel.innerHTML = islands.map((is, i) => `<option value="${i}">${is.name}</option>`).join('');
    }

    function sinkSelectedIsland() {
        const idx = parseInt(document.getElementById('island-to-sink').value);
        const sunk = islands.splice(idx, 1)[0];
        sunkenIslands.push(`${sunk.name} (${new Date().toLocaleTimeString()})`);
        ['cw', 'ccw'].forEach(k => {
            if(state[k].pos === idx) state[k].pos = 0;
            else if(state[k].pos > idx) state[k].pos--;
        });
        saveProjectData(); render();
    }

    function toggleSinkRecord() {
        const m = document.getElementById('sink-modal');
        const o = document.getElementById('modal-overlay');
        const isShow = m.style.display === 'block';
        if(!isShow) document.getElementById('sink-list').innerHTML = sunkenIslands.map(s => `<li>${s}</li>`).join('');
        m.style.display = o.style.display = isShow ? 'none' : 'block';
    }

    initProjectManager();
    window.addEventListener('resize', () => render());
</script>

</body>
</html>
