<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>쿨라(Kula) 링 모바일 최적화 시뮬레이터 - 원형 궤도 유지</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            margin: 0; padding: 0;
            overflow: hidden; 
            width: 100vw; height: 100vh;
            color: white;
            background-image: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
        }

        /* --- 전체 화면 귀여운 물결 효과 --- */
        .wave-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: 1; pointer-events: none; }
        .wave { position: absolute; top: -50vh; left: -50vw; width: 200vw; height: 200vh; background-repeat: repeat; }
        .wave1 { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100"><path fill="none" stroke="%23ffffff" stroke-width="2.5" stroke-opacity="0.3" d="M0,50 C100,80 100,20 200,50 C300,80 300,20 400,50"></path></svg>'); background-size: 400px 100px; animation: wave1-move 12s linear infinite; z-index: 10; }
        .wave2 { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80"><path fill="none" stroke="%23ffffff" stroke-width="2" stroke-opacity="0.2" d="M0,40 C75,10 75,70 150,40 C225,10 225,70 300,40"></path></svg>'); background-size: 300px 80px; animation: wave2-move 8s linear infinite; z-index: 5; }
        @keyframes wave1-move { 0% { transform: translate(0, 0); } 100% { transform: translate(-400px, 100px); } }
        @keyframes wave2-move { 0% { transform: translate(0, 0); } 100% { transform: translate(300px, -80px); } }

        #paths-svg { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; }
        .route-line { fill: none; stroke: rgba(255, 255, 255, 0.6); stroke-width: 2; stroke-dasharray: 8 6; }

        /* --- 📂 프로젝트 매니저 패널 --- */
        #project-manager {
            position: absolute; bottom: 20px; left: 20px;
            padding: 15px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px); border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 200; color: #333; display: flex; flex-direction: column; gap: 10px;
            width: 220px;
        }
        #project-manager h3 { margin: 0; font-size: 14px; color: #2e7d32; border-bottom: 1px solid #ddd; padding-bottom: 5px; }

        /* --- 컨트롤 패널 --- */
        #control-panel { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 15px; background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(5px); border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; gap: 10px; z-index: 100; color: #333; min-width: 320px;
        }
        
        /* --- 양쪽 항해 일지 패널 --- */
        .log-panel {
            position: absolute; top: 20px; width: 150px; 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px); border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); padding: 12px;
            display: flex; flex-direction: column; gap: 8px; z-index: 100; color: #333;
        }
        #log-panel-cw { left: 15px; border-top: 4px solid #ff0844; }
        #log-panel-ccw { right: 15px; border-top: 4px solid #999; }
        .log-panel h3 { margin: 0; font-size: 14px; text-align: center; border-bottom: 2px solid #ddd; padding-bottom: 6px; }
        .log-content { font-size: 11px; line-height: 1.5; background: rgba(255, 255, 255, 0.6); padding: 8px; border-radius: 6px; height: 120px; overflow-y: auto; border: 1px inset #ddd; word-break: keep-all; }
        .log-content::-webkit-scrollbar { width: 5px; }
        .log-content::-webkit-scrollbar-thumb { background: #bbb; border-radius: 3px; }

        .control-group { display: flex; gap: 6px; align-items: center; justify-content: center; }
        .divider { border-top: 1px solid #ccc; width: 100%; margin: 2px 0; }

        input, select { padding: 6px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-weight: bold; font-family: inherit; font-size: 13px; }
        
        button { padding: 6px 10px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; transition: transform 0.1s, opacity 0.2s; font-size: 13px; white-space: nowrap; }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        
        .btn-add { background-color: #2e7d32; }
        .btn-del { background-color: #c62828; }
        .btn-view { background-color: #455a64; }
        .btn-undo { background-color: #78909c; }
        .btn-cw { background-image: linear-gradient(to right, #ff0844 0%, #ffb199 100%); flex-grow: 1; }
        .btn-ccw { background-image: linear-gradient(to right, #d5d4d0 0%, #eeeeec 100%); color: #333; flex-grow: 1; }

        /* --- 모달 --- */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); z-index: 999; }
        #sink-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 15px; z-index: 1000; color: #333; min-width: 250px; text-align: center; }
        #sink-modal h2 { margin-top: 0; color: #c62828; font-size: 18px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        #sink-list { list-style: none; padding: 0; margin: 15px 0; font-size: 12px; line-height: 1.8; text-align: left; }
        #sink-list li { border-bottom: 1px dashed #ccc; padding: 5px 0; }
        #sink-list li::before { content: '🌊 '; }
        .btn-close { background-color: #333; margin-top: 10px; width: 100%; color: white; padding: 10px; }

        #ocean-map { position: relative; width: 100vw; height: 100vh; z-index: 10; overflow: hidden; }

        /* --- 활성화된 섬 --- */
        .island {
            position: absolute; width: 80px; height: 80px;
            background-image: linear-gradient(to top, #0ba360 0%, #3cba92 100%); 
            border: 3px solid #1a661a; border-radius: 50% 60% 50% 70% / 60% 50% 70% 50%;
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 14px; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            box-shadow: 3px 5px 15px rgba(0,0,0,0.3); transition: all 0.8s ease; z-index: 10;
        }

        /* --- 가라앉은 섬 흔적 --- */
        .sunken-island {
            position: absolute; width: 80px; height: 80px;
            background: rgba(0, 77, 128, 0.4); border: 2px dashed rgba(255, 255, 255, 0.4); 
            border-radius: 50% 60% 50% 70% / 60% 50% 70% 50%;
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 14px; color: rgba(255, 255, 255, 0.5); 
            text-decoration: line-through; box-shadow: inset 2px 3px 10px rgba(0,0,0,0.3); 
            z-index: 4; pointer-events: none; transition: all 0.8s ease; 
        }

        .item { position: absolute; width: 50px; height: 35px; cursor: default; z-index: 50; display: flex; align-items: center; justify-content: center; transition: left 1s ease-in-out, top 1s ease-in-out; }
        .boat-body { position: absolute; width: 100%; height: 100%; z-index: -1; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .boat-name { font-size: 10px; font-weight: bold; z-index: 1; pointer-events: none; }
        .item-cw .boat-body { background-image: linear-gradient(to top, #ff0844 0%, #ffb199 100%); border: 2px solid #d32f2f; border-radius: 50% 50% 50% 10%; } 
        .item-cw .boat-name { color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .item-ccw .boat-body { background-image: linear-gradient(to top, #d5d4d0 0%, #eeeeec 100%); border: 2px solid #aaa; border-radius: 4px; } 
        .item-ccw .boat-name { color: #333; }

        /* =========================================
           📱 모바일 최적화 
           ========================================= */
        @media (max-width: 768px) {
            #project-manager {
                top: 0; left: 0; bottom: auto; width: 100vw; border-radius: 0 0 15px 15px;
                flex-direction: row; flex-wrap: wrap; justify-content: space-between; align-items: center;
                padding: 10px; box-sizing: border-box;
            }
            #project-manager h3 { border: none; padding: 0; margin-bottom: 0; }
            
            #control-panel {
                top: auto; bottom: 0; left: 0; transform: none; width: 100vw;
                border-radius: 15px 15px 0 0; box-sizing: border-box;
                min-width: 100vw; padding: 12px; padding-bottom: 25px; 
            }

            .log-panel { top: 70px; width: 120px; padding: 8px; box-sizing: border-box; }
            #log-panel-cw { left: 10px; }
            #log-panel-ccw { right: 10px; }
            .log-content { height: 70px; } 
            
            .control-group input[type="text"] { flex-grow: 1; }
        }
    </style>
</head>
<body>

<div class="wave-container">
    <div class="wave wave1"></div>
    <div class="wave wave2"></div>
</div>

<svg id="paths-svg"></svg>

<div id="project-manager">
    <h3>📂 내 쿨라 프로젝트</h3>
    <select id="project-selector" onchange="switchProject(this.value)" style="flex-grow: 1; max-width: 120px;"></select>
    <div class="control-group" style="margin-left: auto;">
        <input type="text" id="new-project-name" placeholder="새 이름" style="width: 70px; font-size: 11px;">
        <button class="btn-add" onclick="createNewProject()" style="padding: 6px;">+</button>
        <button class="btn-del" onclick="deleteCurrentProject()" style="padding: 6px;">🗑️</button>
    </div>
</div>

<div id="log-panel-cw" class="log-panel">
    <h3>📜 <span id="log-cw-title">술라바</span> 일지</h3>
    <div id="log-cw-content" class="log-content"></div>
</div>

<div id="log-panel-ccw" class="log-panel">
    <h3>📜 <span id="log-ccw-title">음왈리</span> 일지</h3>
    <div id="log-ccw-content" class="log-content"></div>
</div>

<div id="control-panel">
    <div class="control-group">
        <button class="btn-undo" onclick="resetState()" title="모든 데이터 지우기" style="background:#ff9800; padding:6px 8px;">전체 초기화</button>
        <input type="text" id="island-name" placeholder="새로운 섬 이름" style="width: 90px;">
        <button class="btn-add" onclick="addIsland()">발견!</button>
    </div>
    <div class="control-group">
        <select id="island-to-sink" style="width: 110px;"></select>
        <button class="btn-del" onclick="sinkSelectedIsland()">침몰</button>
        <button class="btn-view" onclick="toggleSinkRecord()">기록</button>
    </div>
    
    <div class="divider"></div>
    
    <div class="control-group">
        <input type="text" id="input-cw" oninput="updateName('cw', this.value)" style="width: 80px;">
        <button class="btn-cw" onclick="startVoyage('cw')" id="btn-cw-text">🐚 출발</button>
        <button class="btn-undo" onclick="undoVoyage('cw')">↩️</button>
    </div>
    
    <div class="control-group">
        <input type="text" id="input-ccw" oninput="updateName('ccw', this.value)" style="width: 80px;">
        <button class="btn-ccw" onclick="startVoyage('ccw')" id="btn-ccw-text">🔲 출발</button>
        <button class="btn-undo" onclick="undoVoyage('ccw')">↩️</button>
    </div>
</div>

<div id="modal-overlay" onclick="toggleSinkRecord()"></div>
<div id="sink-modal">
    <h2>침몰 기록</h2>
    <ul id="sink-list" style="list-style:none; padding:0; text-align:left; max-height:300px; overflow-y:auto;"></ul>
    <button class="btn-close" onclick="toggleSinkRecord()">닫기</button>
</div>

<div id="ocean-map"></div>

<script>
    // --- 설정 ---
    // 오차 범위를 약간 줄여서 원형 궤도를 더 선명하게 보이도록 함
    const getIrregular = () => (Math.random() - 0.5) * 40; 
    
    let currentProject = "";
    let projectList = [];
    let islands = [];
    let sunkenIslands = []; 
    let state = {};
    let centerX, centerY, safeWidth, safeHeight;
    let baseRadiusX, baseRadiusY;

    function saveProjectData() {
        if (!currentProject) return;
        const data = { islands, sunkenIslands, state };
        localStorage.setItem(`kula_data_${currentProject}`, JSON.stringify(data));
        localStorage.setItem('kula_current_project', currentProject);
        localStorage.setItem('kula_project_list', JSON.stringify(projectList));
    }

    window.addEventListener('beforeunload', () => { saveProjectData(); });

    function initProjectManager() {
        updateDimensions(); 
        const savedList = localStorage.getItem('kula_project_list');
        if (savedList) { projectList = JSON.parse(savedList); } 
        else { projectList = ["기본 바다"]; }
        
        const lastSavedProject = localStorage.getItem('kula_current_project');
        if (lastSavedProject && projectList.includes(lastSavedProject)) {
            currentProject = lastSavedProject;
        } else {
            currentProject = projectList[0];
        }
        
        updateProjectSelector();
        loadProjectData(currentProject);
    }

    function updateProjectSelector() {
        const sel = document.getElementById('project-selector');
        sel.innerHTML = '';
        projectList.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p; opt.text = p;
            if(p === currentProject) opt.selected = true;
            sel.add(opt);
        });
    }

    function createNewProject() {
        const name = document.getElementById('new-project-name').value.trim();
        if (!name || projectList.includes(name)) return alert("중복되거나 유효하지 않은 이름입니다.");
        
        projectList.push(name);
        localStorage.setItem('kula_project_list', JSON.stringify(projectList)); 
        document.getElementById('new-project-name').value = '';
        switchProject(name);
    }

    function switchProject(name) {
        if (currentProject) saveProjectData();
        currentProject = name;
        loadProjectData(name);
        saveProjectData(); 
        updateProjectSelector(); 
        render();
    }

    function deleteCurrentProject() {
        if (projectList.length <= 1) return alert("최소 한 개의 프로젝트는 남겨두어야 합니다.");
        if (!confirm(`'${currentProject}' 프로젝트를 영구 삭제하시겠습니까?`)) return;

        localStorage.removeItem(`kula_data_${currentProject}`);
        projectList = projectList.filter(p => p !== currentProject);
        localStorage.setItem('kula_project_list', JSON.stringify(projectList));
        switchProject(projectList[0]);
    }

    function loadProjectData(name) {
        const saved = localStorage.getItem(`kula_data_${name}`);
        if (saved) {
            const parsed = JSON.parse(saved);
            islands = parsed.islands;
            sunkenIslands = parsed.sunkenIslands || [];
            state = parsed.state;
            
            // 구버전(절대 좌표) 데이터 호환성 보정: 절대 좌표를 지우고 오프셋만 남겨 재배치 허용
            islands.forEach((is) => {
                if(is.x !== undefined) { delete is.x; delete is.y; }
            });
            sunkenIslands.forEach((sunk) => {
                if(sunk.x !== undefined) { delete sunk.x; delete sunk.y; }
            });

        } else {
            islands = [
                { name: '키리위나', offsetX: getIrregular(), offsetY: getIrregular() },
                { name: '도부', offsetX: getIrregular(), offsetY: getIrregular() },
                { name: '투비투비', offsetX: getIrregular(), offsetY: getIrregular() }
            ];
            sunkenIslands = [];
            state = {
                cw: { pos: 0, log: [], name: '술라바' },
                ccw: { pos: 1, log: [], name: '음왈리' }
            };
        }
        document.getElementById('input-cw').value = state.cw.name;
        document.getElementById('input-ccw').value = state.ccw.name;
    }

    function resetState() {
        if(confirm("모든 기기의 데이터가 영구히 삭제됩니다. 완전히 처음으로 돌아가시겠습니까?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function updateDimensions() {
        const isMobile = window.innerWidth <= 768;
        const pTop = isMobile ? 180 : 180;    
        const pBottom = isMobile ? 180 : 120; 
        const pSide = isMobile ? 60 : 200;    

        safeWidth = window.innerWidth - (pSide * 2);
        safeHeight = window.innerHeight - pTop - pBottom;
        
        centerX = pSide + (safeWidth / 2); 
        centerY = pTop + (safeHeight / 2);
        
        // 타원형 궤도를 위해 X, Y 반지름 분리
        baseRadiusX = safeWidth * 0.4; 
        baseRadiusY = safeHeight * 0.4;
        
        if(baseRadiusX < 80) baseRadiusX = 80;
        if(baseRadiusY < 80) baseRadiusY = 80;
    }

    // --- ★ 동적 궤도 배치 로직 ★ ---
    // 전체 섬(활성+침몰)을 하나의 궤도 위에 일정한 간격으로 배치
    function calculateCoordinate(index, totalIslandsLength, offsetX, offsetY) {
        // 섬의 총 개수에 따라 각도를 균등하게 나눔
        const angle = (index / totalIslandsLength) * (2 * Math.PI) - (Math.PI / 2);
        return {
            x: centerX + (baseRadiusX + offsetX) * Math.cos(angle),
            y: centerY + (baseRadiusY + offsetY) * Math.sin(angle)
        };
    }

    function getIslandCenter(index) {
        // 활성화된 섬들의 위치 (침몰 섬 포함된 전체 배열 길이 기준)
        const totalLen = islands.length + sunkenIslands.length;
        // 활성화된 섬은 앞쪽 인덱스를 차지함
        return calculateCoordinate(index, totalLen, islands[index].offsetX, islands[index].offsetY);
    }
    
    function getSunkenIslandCenter(index) {
        // 침몰한 섬들의 위치
        const totalLen = islands.length + sunkenIslands.length;
        // 침몰한 섬은 뒤쪽 인덱스(islands.length 이후)를 차지함
        const targetIndex = islands.length + index;
        return calculateCoordinate(targetIndex, totalLen, sunkenIslands[index].offsetX, sunkenIslands[index].offsetY);
    }

    function getItemPoint(key, index) {
        const c = getIslandCenter(index);
        return key === 'cw' ? { x: c.x, y: c.y - 45 } : { x: c.x, y: c.y + 45 };
    }

    function render(movingKey = null) {
        updateDimensions();
        updateDropdown();
        const map = document.getElementById('ocean-map');
        
        // 1. 활성화된 섬 그리기 (위치 재계산)
        islands.forEach((is, i) => {
            let div = document.getElementById(`island-${i}`);
            if(!div) { div = document.createElement('div'); div.id = `island-${i}`; div.className = 'island'; map.appendChild(div); }
            div.innerText = is.name;
            const c = getIslandCenter(i);
            div.style.left = `${c.x - 40}px`; div.style.top = `${c.y - 40}px`; 
        });
        document.querySelectorAll('.island').forEach(el => { if(parseInt(el.id.split('-')[1]) >= islands.length) el.remove(); });

        // 2. 가라앉은 섬 흔적 그리기 (위치 재계산)
        sunkenIslands.forEach((sunk, i) => {
            if (typeof sunk === 'string') return; 
            let div = document.getElementById(`sunken-${i}`);
            if(!div) { div = document.createElement('div'); div.id = `sunken-${i}`; div.className = 'sunken-island'; map.appendChild(div); }
            div.innerText = sunk.name;
            const c = getSunkenIslandCenter(i);
            div.style.left = `${c.x - 40}px`; div.style.top = `${c.y - 40}px`;
        });
        document.querySelectorAll('.sunken-island').forEach(el => { if(parseInt(el.id.split('-')[1]) >= sunkenIslands.length) el.remove(); });

        // 3. 점선 경로 업데이트 (활성 섬만 연결)
        const svg = document.getElementById('paths-svg');
        svg.innerHTML = '';
        if(islands.length > 1) {
            let pts = islands.map((_, i) => { const c = getIslandCenter(i); return `${c.x},${c.y}`; }).join(' ');
            const c0 = getIslandCenter(0); pts += ` ${c0.x},${c0.y}`;
            const line = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
            line.setAttribute("points", pts); line.setAttribute("class", "route-line"); svg.appendChild(line);
        }

        // 4. 아이템(배) 그리기
        ['cw', 'ccw'].forEach(key => {
            let div = document.getElementById(`item-${key}`);
            if(!div) { div = document.createElement('div'); div.id = `item-${key}`; div.className = `item item-${key}`; div.innerHTML = `<div class="boat-body"></div><span class="boat-name"></span>`; map.appendChild(div); }
            div.querySelector('.boat-name').innerText = state[key].name;
            if(movingKey !== key) {
                const p = getItemPoint(key, state[key].pos);
                div.style.left = `${p.x - 25}px`; div.style.top = `${p.y - 17.5}px`; div.style.transition = 'all 1s';
            }
        });

        updateLogPanel();
        updateName('cw', state.cw.name);
        updateName('ccw', state.ccw.name);
    }

    function addIsland() {
        const input = document.getElementById('island-name');
        const name = input.value || `섬 ${islands.length+1}`;
        // 새 섬은 궤도의 가장 마지막 위치에 추가됨
        islands.push({ name: name, offsetX: getIrregular(), offsetY: getIrregular() });
        input.value = ''; saveProjectData(); render();
    }

    function startVoyage(key) {
        if(islands.length < 2) return;
        const prev = state[key].pos;
        state[key].log.push(islands[prev].name);
        state[key].pos = key === 'cw' ? (prev + 1) % islands.length : (prev - 1 + islands.length) % islands.length;
        saveProjectData();
        animate(key, prev, state[key].pos);
    }

    function undoVoyage(key) {
        if(state[key].log.length === 0) return;
        const last = state[key].log.pop();
        if(last.includes('대피')) { state[key].log.push(last); return alert("침몰 대피는 되돌릴 수 없습니다."); }
        const target = islands.findIndex(is => is.name === last);
        if(target === -1) { state[key].log.push(last); return alert("섬이 완전히 침몰하여 돌아갈 수 없습니다."); }
        const current = state[key].pos;
        state[key].pos = target;
        saveProjectData();
        animate(key, current, target);
    }

    function animate(key, startIdx, endIdx) {
        const el = document.getElementById(`item-${key}`);
        const start = getItemPoint(key, startIdx);
        const end = getItemPoint(key, endIdx);
        const startTime = performance.now();
        el.style.transition = 'none';

        function step(now) {
            const progress = Math.min((now - startTime) / 1200, 1);
            const p = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
            const curX = (1-p)*start.x + p*end.x;
            const curY = (1-p)*start.y + p*end.y;
            el.style.left = `${curX - 25}px`; el.style.top = `${curY - 17.5}px`;
            if(progress < 1) requestAnimationFrame(step); else render();
        }
        requestAnimationFrame(step);
    }

    function updateName(key, val) {
        state[key].name = val || (key === 'cw' ? '술라바' : '음왈리');
        const el = document.getElementById(`item-${key}`);
        if(el) el.querySelector('.boat-name').innerText = state[key].name;
        
        const btn = document.getElementById(`btn-${key}-text`);
        const icon = key === 'cw' ? '🐚' : '🔲';
        const dirText = key === 'cw' ? ' ↻' : ' ↺';
        if(btn) btn.innerText = `${icon} 출발${dirText}`;

        const logTitle = document.getElementById(`log-${key}-title`);
        if(logTitle) logTitle.innerText = state[key].name;

        saveProjectData(); 
    }

    function updateLogPanel() {
        ['cw', 'ccw'].forEach(k => {
            const div = document.getElementById(`log-${k}-content`);
            if (islands.length === 0) {
                div.innerHTML = '바다가 텅 비었습니다.';
                return;
            }
            
            const currentIsland = islands[state[k].pos] ? islands[state[k].pos].name : '미지의 공간';
            const currentHtml = `<br>➔ <b>📍 [현재] ${currentIsland}</b>`;
            
            if (state[k].log.length > 0) {
                div.innerHTML = state[k].log.join('<br>➔ ') + currentHtml; 
            } else {
                div.innerHTML = `<b>📍 [현재] ${currentIsland}</b><br>출발 대기 중...`;
            }
            div.scrollTop = div.scrollHeight;
        });
    }

    function updateDropdown() {
        const sel = document.getElementById('island-to-sink');
        sel.innerHTML = islands.map((is, i) => `<option value="${i}">${is.name}</option>`).join('');
    }

    function sinkSelectedIsland() {
        const idx = parseInt(document.getElementById('island-to-sink').value);
        if (isNaN(idx)) return;
        
        if (islands.length <= 1) {
            alert("바다에 섬이 최소 1개는 남아있어야 합니다!");
            return;
        }

        const sunk = islands.splice(idx, 1)[0];
        
        const now = new Date();
        const dateString = now.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\./g, '').replace(/ /g, '-');
        const timeString = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        
        sunk.time = `${dateString} ${timeString}`;
        sunkenIslands.push(sunk); 
        
        ['cw', 'ccw'].forEach(k => {
            if(state[k].pos === idx) {
                state[k].pos = 0; 
                if (islands.length > 0) {
                    state[k].log.push(`[🚨 긴급 대피] ➔ ${islands[0].name}`);
                }
            }
            else if(state[k].pos > idx) {
                state[k].pos--;
            }
        });
        
        saveProjectData(); 
        render(); 
        
        const m = document.getElementById('sink-modal');
        if (m.style.display === 'block') {
            updateSinkModalContent();
        }
    }

    function toggleSinkRecord() {
        const m = document.getElementById('sink-modal');
        const o = document.getElementById('modal-overlay');
        const isShow = m.style.display === 'block';
        if(!isShow) updateSinkModalContent();
        m.style.display = o.style.display = isShow ? 'none' : 'block';
    }

    function updateSinkModalContent() {
        const list = document.getElementById('sink-list');
        if (sunkenIslands.length === 0) {
            list.innerHTML = "<li style='border:none; text-align:center;'>아직 바다 밑으로 가라앉은 섬이 없습니다.</li>";
        } else {
            list.innerHTML = sunkenIslands.map(s => {
                const text = typeof s === 'string' ? s : `${s.name} <span style="color:#888; font-size:11px;">(${s.time})</span>`;
                return `<li>${text}</li>`;
            }).join('');
        }
    }

    initProjectManager();
    window.addEventListener('resize', () => render());
</script>

</body>
</html>
